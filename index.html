<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>북 PDF 에디터</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gaegu:wght@400;700&family=Nanum+Gothic:wght@400;700;800&family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+KR:wght@400;700&family=Sunflower:wght@300;500;700&family=Dancing+Script:wght@400;700&family=Lato:wght@400;700&family=Montserrat:wght@400;700&family=Oswald:wght@400;700&family=Playfair+Display:wght@400;700&family=Raleway:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  height:100%;display:flex;flex-direction:column;
  font-family:'Segoe UI',system-ui,sans-serif;
  background:#f0f0ed;color:#1a1a1a;font-size:12px;
  overflow:hidden;
}

/* ── 공통 버튼 ── */
.tb{border:1px solid #d0ccc6;border-radius:3px;padding:0 8px;font-size:11px;cursor:pointer;background:#f5f5f2;color:#aaa;height:22px;white-space:nowrap;line-height:20px}
.tb:active{opacity:.7}.tb.on{background:#1a56db;color:#fff;border-color:#1a56db}
.ts{border:1px solid #d0ccc6;border-radius:3px;padding:2px 4px;font-size:11px;background:#f5f5f2;color:#1a1a1a;outline:none;height:22px}
.tn{border:1px solid #d0ccc6;border-radius:3px;padding:2px 4px;font-size:11px;background:#f5f5f2;color:#1a1a1a;outline:none;height:22px;width:48px}
.tc{width:24px;height:22px;padding:1px;border:1px solid #d0ccc6;border-radius:3px;cursor:pointer}
.sep{width:1px;height:16px;background:#333;margin:0 2px;flex-shrink:0}
.tl{font-size:10px;color:#999;white-space:nowrap}

/* ── 데스크탑 툴바 (모바일에서 숨김) ── */
#d-toolbar{
  flex-shrink:0;background:#ffffff;
  border-bottom:1px solid #e0ddd8;
  display:none; /* JS로 데스크탑에서만 표시 */
}
#tb1,#tb2{display:flex;align-items:center;gap:4px;padding:4px 8px;overflow-x:auto;min-height:30px;scrollbar-width:none}
#tb1::-webkit-scrollbar,#tb2::-webkit-scrollbar{display:none}
#tb1{border-bottom:1px solid #e0ddd8}
#d-exportBtn{background:#1a7a1a;color:#fff;border:none;border-radius:3px;padding:0 12px;font-size:11px;font-weight:600;cursor:pointer;height:22px}

/* ── 모바일 상단바 ── */
#m-topbar{
  flex-shrink:0;height:44px;
  background:#ffffff;border-bottom:1px solid #e0ddd8;
  display:flex;align-items:center;gap:6px;
  padding:0 8px;overflow-x:auto;scrollbar-width:none;
}
#m-topbar::-webkit-scrollbar{display:none}
#m-topbar .tb{height:28px;font-size:11px;padding:0 10px}
#m-export-btn{
  background:#1a7a1a;color:#fff;border:none;border-radius:14px;
  padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;
  margin-left:auto;flex-shrink:0;
}

/* ── 메인 영역 ── */
#main{
  flex:1;display:flex;
  overflow:hidden;min-height:0;
}

/* ── 데스크탑 썸네일 패널 ── */
#panel-left{
  width:110px;background:#ffffff;
  border-right:1px solid #e0ddd8;
  overflow-y:auto;padding:6px 4px;
  flex-shrink:0;display:none;
  scrollbar-width:thin;scrollbar-color:#bbb transparent;
}
#panel-left h4{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;padding:0 2px}
.sthumb{display:flex;flex-direction:column;margin-bottom:5px;cursor:pointer;border:1.5px solid #ddd8d0;border-radius:3px;overflow:hidden}
.sthumb:hover{border-color:#4a7ef0}.sthumb.on{border-color:#1a56db}
.sthumb-row{display:flex;background:#f8f7f5}
.sthumb-l,.sthumb-r{flex:1;background:#fff;overflow:hidden}
.sthumb-l canvas,.sthumb-r canvas{display:block;width:100%;height:100%}
.sthumb-spine{width:2px;background:#444;flex-shrink:0}
.sthumb-nums{display:flex;justify-content:space-between;padding:1px 4px;font-size:7px;color:#999;background:#f8f7f5}

/* ── 캔버스 영역 ── */
#canvas-area{
  flex:1;display:flex;flex-direction:column;
  align-items:center;overflow:auto;
  padding:12px;background:#f0f0ed;
  min-height:0;min-width:0;
}
#spread-label{font-size:10px;color:#999;margin-bottom:6px;flex-shrink:0;text-align:center}
#wrap{position:relative;line-height:0;flex-shrink:0}
#c{display:block;touch-action:none;cursor:default}
#gsvg,#ssvg{position:absolute;top:0;left:0;pointer-events:none}

/* ── 데스크탑 속성 패널 ── */
#panel-right{
  width:200px;background:#ffffff;
  border-left:1px solid #e0ddd8;
  padding:10px 8px;overflow-y:auto;
  flex-shrink:0;display:none;
  scrollbar-width:thin;scrollbar-color:#bbb transparent;
}
.ph{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.7px;font-weight:600;margin:9px 0 5px}
.ph:first-child{margin-top:0}
.pr{margin-bottom:7px}
.pr label{font-size:10px;color:#999;display:block;margin-bottom:2px}
.pr input,.pr select,.pr textarea{width:100%;border:1px solid #d8d4ce;border-radius:3px;padding:3px 6px;font-size:11px;background:#f8f7f5;color:#1a1a1a;outline:none}
.pr textarea{resize:vertical;min-height:44px;font-family:inherit}
.pr2{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:7px}
.pr2 label{font-size:10px;color:#999;display:block;margin-bottom:2px}
.pr2 input{width:100%;border:1px solid #d8d4ce;border-radius:3px;padding:3px 5px;font-size:11px;background:#f8f7f5;color:#1a1a1a;outline:none}
.ag{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-bottom:3px}
.ab{border:1px solid #d8d4ce;border-radius:3px;padding:3px 0;font-size:13px;cursor:pointer;background:#f8f7f5;color:#888;text-align:center}
.ab:hover{background:#f0ede8;color:#fff}
.ac{width:100%;border:1px solid #d8d4ce;border-radius:3px;padding:5px;font-size:10px;cursor:pointer;background:#f8f7f5;color:#888;margin-bottom:3px;text-align:center}
.ac:hover{background:#f0ede8}
.ac.red{color:#d05555;border-color:#5a2020}
.hr{height:1px;background:#f5f5f2;margin:7px 0}
#no-sel{font-size:10px;color:#aaa;line-height:1.8}

/* ── 모바일 하단 탭바 (flex - position:fixed 없음!) ── */
#m-tabbar{
  flex-shrink:0;height:56px;
  background:#ffffff;border-top:1px solid #e0ddd8;
  display:flex; /* 기본 보임 - JS로 데스크탑에서만 숨김 */
}
.m-tab{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:2px;border:none;background:none;
  color:#999;font-size:9px;cursor:pointer;
  padding:4px 2px;
}
.m-tab .ico{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.m-tab.on{color:#1a56db}
.m-tab:active{opacity:.6}

/* ── 모바일 하단 시트 (position:fixed OK - 오버레이라서) ── */
#m-sheet{
  position:fixed;left:0;right:0;bottom:0;
  background:#f5f5f2;border-top:1px solid #ddd8d0;
  border-radius:14px 14px 0 0;
  max-height:60%;overflow-y:auto;
  transform:translateY(105%);
  transition:transform .22s ease;
  z-index:500;
  padding:0 14px 24px;
}
#m-sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:#333;border-radius:2px;margin:10px auto 12px}

/* ── 텍스트 입력 오버레이 ── */
#text-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.45);z-index:600;
  flex-direction:column;justify-content:flex-end;
}
#text-overlay.show{display:flex}
#text-box{background:#f5f5f2;border-radius:14px 14px 0 0;padding:16px;flex-shrink:0}
#text-box h3{font-size:13px;color:#999;margin-bottom:10px}
#text-input{
  width:100%;background:#f8f7f5;border:1px solid #d0ccc6;
  border-radius:8px;padding:12px;color:#1a1a1a;font-size:16px;
  height:90px;resize:none;outline:none;font-family:inherit;display:block;
}
#text-btns{display:flex;gap:8px;margin-top:12px}
#text-btns button{flex:1;padding:14px;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:700}
#text-cancel{background:#eeebe6;color:#999}
#text-confirm{background:#1a56db;color:#fff}
#text-spacer{flex-shrink:0;height:0;background:#f5f5f2;transition:height .1s}

/* ── 폰트 선택 옵션 ── */
select optgroup{background:#f5f5f2}
</style>
</head>
<body>

<!-- 데스크탑 툴바 -->
<div id="d-toolbar">
  <div id="tb1">
    <button class="tb on" id="btn-select" onclick="setTool('select')"><svg width="12" height="12" viewBox="0 0 12 12" style="vertical-align:-1px"><path d="M3 2l7 4-7 4V2z" fill="currentColor"/></svg> 선택</button>
    <button class="tb" id="btn-text" onclick="setTool('text')"><svg width="12" height="12" viewBox="0 0 12 12" style="vertical-align:-1px"><text x="1" y="11" font-size="11" font-weight="700" font-family="serif" fill="currentColor">T</text></svg> 텍스트</button>
    <button class="tb" id="btn-image" onclick="document.getElementById('fi').click()"><svg width="12" height="12" viewBox="0 0 12 12" style="vertical-align:-1px"><rect x="1" y="1" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2"/><circle cx="4" cy="4.5" r="1" fill="currentColor"/><path d="M1 8.5l3-3 2.5 2.5 2-2 3.5 3.5H1z" fill="currentColor"/></svg> 이미지</button>
    <input type="file" id="fi" accept="image/*" style="display:none">
    <div class="sep"></div>
    <button class="tb on" id="btn-bleed" onclick="tog('bleed')">블리드</button>
    <button class="tb on" id="btn-art" onclick="tog('art')">아트보드</button>
    <button class="tb on" id="btn-snap" onclick="tog('snap')">스냅</button>
    <div class="sep"></div>
    <span id="d-status" style="font-size:10px;color:#999">p32·1</span>
    <div style="flex:1"></div>
    <button id="d-exportBtn" onclick="exportPDF()"><svg width="12" height="12" viewBox="0 0 12 12" style="vertical-align:-1px"><path d="M6 1v7M3 5l3 3 3-3M1 10h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg> PDF 내보내기</button>
  </div>
  <div id="tb2">
    <label class="tl">폰트</label>
    <select class="ts" id="sfont" onchange="applyTxtStyle()" style="width:110px">
      <optgroup label="시스템">
        <option value="'Malgun Gothic','Apple SD Gothic Neo',sans-serif">맑은고딕</option>
        <option value="'Batang','AppleMyungjo',serif">바탕</option>
        <option value="Georgia,serif">Georgia</option>
        <option value="Arial,sans-serif">Arial</option>
      </optgroup>
      <optgroup label="한국어 웹폰트">
        <option value="'Nanum Gothic',sans-serif">나눔고딕</option>
        <option value="'Nanum Myeongjo',serif">나눔명조</option>
        <option value="'Noto Sans KR',sans-serif">Noto Sans KR</option>
        <option value="'Noto Serif KR',serif">Noto Serif KR</option>
        <option value="'Black Han Sans',sans-serif">블랙한산스</option>
        <option value="'Nanum Pen Script',cursive">나눔펜</option>
        <option value="'Gaegu',cursive">개구체</option>
        <option value="'Sunflower',sans-serif">해바라기</option>
      </optgroup>
      <optgroup label="영문 웹폰트">
        <option value="'Playfair Display',serif">Playfair Display</option>
        <option value="'Montserrat',sans-serif">Montserrat</option>
        <option value="'Lato',sans-serif">Lato</option>
        <option value="'Raleway',sans-serif">Raleway</option>
        <option value="'Oswald',sans-serif">Oswald</option>
        <option value="'Dancing Script',cursive">Dancing Script</option>
      </optgroup>
    </select>
    <label class="tl">크기</label><input class="tn" type="number" id="ssize" value="14" min="4" max="200" step="0.5" onchange="applyTxtStyle()">
    <label class="tl">색</label><input class="tc" type="color" id="scolor" value="#000000" onchange="applyTxtStyle()">
    <label class="tl">굵기</label>
    <select class="ts" id="sweight" onchange="applyTxtStyle()" style="width:80px">
      <option value="300">Light</option><option value="400" selected>Regular</option>
      <option value="500">Medium</option><option value="700">Bold</option><option value="800">ExtraBold</option>
    </select>
    <label class="tl">스타일</label>
    <select class="ts" id="sstyle" onchange="applyTxtStyle()" style="width:62px">
      <option value="normal" selected>보통</option><option value="italic">이탤릭</option>
    </select>
  </div>
</div>

<!-- 모바일 상단바 -->
<div id="m-topbar">
  <button class="tb on" id="m-btn-bleed" onclick="tog('bleed')">블리드</button>
  <button class="tb on" id="m-btn-art" onclick="tog('art')">아트보드</button>
  <button class="tb on" id="m-btn-snap" onclick="tog('snap')">스냅</button>
  <span id="m-status" style="font-size:10px;color:#999;margin-left:6px;white-space:nowrap">p32·1</span>
  <button id="m-export-btn" onclick="exportPDF()"><svg width="12" height="12" viewBox="0 0 12 12" style="vertical-align:-1px"><path d="M6 1v7M3 5l3 3 3-3M1 10h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg> PDF</button>
</div>

<input type="file" id="fi-m" accept="image/*" style="display:none">

<!-- 메인 -->
<div id="main">
  <div id="panel-left"><h4>스프레드</h4><div id="thumbs"></div></div>
  <div id="canvas-area">
    <div id="spread-label">스프레드 32 · 1</div>
    <div id="wrap">
      <canvas id="c"></canvas>
      <svg id="gsvg"></svg>
      <svg id="ssvg"></svg>
    </div>
  </div>
  <div id="panel-right">
    <div id="no-sel">요소를 클릭해 선택하세요.<br><br>🖼 이미지는 양쪽 배치 가능<br>T 텍스트는 더블클릭 편집</div>
    <div id="sel-wrap" style="display:none">
      <div class="ph">위치 / 크기</div>
      <div class="pr2">
        <div><label>X (mm)</label><input type="number" id="px" step="0.1" oninput="fromPanel()"></div>
        <div><label>Y (mm)</label><input type="number" id="py" step="0.1" oninput="fromPanel()"></div>
      </div>
      <div class="pr2" id="sizerow">
        <div><label>W (mm)</label><input type="number" id="pw" step="0.1" min="1" oninput="fromPanelW()"></div>
        <div><label>H (mm)</label><input type="number" id="ph2" step="0.1" min="1" oninput="fromPanelH()"></div>
      </div>
      <div style="margin-bottom:7px;display:flex;align-items:center;gap:5px" id="ratio-row">
        <button id="btn-ratio" onclick="toggleRatio()" style="flex:1;border:1px solid #d8d4ce;border-radius:3px;padding:4px;font-size:10px;cursor:pointer;background:#1a56db;color:#fff">● 비율 유지</button>
        <span id="ratio-val" style="font-size:9px;color:#aaa"></span>
      </div>
      <div class="pr" id="txtrow"><label>텍스트</label><textarea id="ptxt" oninput="fromPanel()"></textarea></div>
      <div class="pr" id="fsrow"><label>폰트 크기</label><input type="number" id="pfs" step="0.5" min="1" oninput="fromPanel()"></div>
      <div class="ph">정렬 — 왼쪽 페이지</div>
      <div class="ag"><button class="ab" onclick="aln('L','L')">|←</button><button class="ab" onclick="aln('CX','L')">⇔</button><button class="ab" onclick="aln('R','L')">→|</button><button class="ab" onclick="aln('F','L')">□</button></div>
      <div class="ag"><button class="ab" onclick="aln('T','L')">↑</button><button class="ab" onclick="aln('CY','L')">⇕</button><button class="ab" onclick="aln('B','L')">↓</button><button class="ab" onclick="aln('BF','L')">⊡</button></div>
      <div class="ph">정렬 — 오른쪽 페이지</div>
      <div class="ag"><button class="ab" onclick="aln('L','R')">|←</button><button class="ab" onclick="aln('CX','R')">⇔</button><button class="ab" onclick="aln('R','R')">→|</button><button class="ab" onclick="aln('F','R')">□</button></div>
      <div class="ag"><button class="ab" onclick="aln('T','R')">↑</button><button class="ab" onclick="aln('CY','R')">⇕</button><button class="ab" onclick="aln('B','R')">↓</button><button class="ab" onclick="aln('BF','R')">⊡</button></div>
      <div class="ph">정렬 — 스프레드</div>
      <div class="ag"><button class="ab" onclick="aln('L','S')">|←</button><button class="ab" onclick="aln('CX','S')">⇔</button><button class="ab" onclick="aln('R','S')">→|</button><button class="ab" onclick="aln('F','S')">□</button></div>
      <div class="ag"><button class="ab" onclick="aln('T','S')">↑</button><button class="ab" onclick="aln('CY','S')">⇕</button><button class="ab" onclick="aln('B','S')">↓</button><button class="ab" onclick="aln('BF','S')">⊡</button></div>
      <div class="ph">다른 요소와 정렬</div>
      <div class="pr"><label>기준 요소</label><select id="refsel" style="width:100%;border:1px solid #d8d4ce;border-radius:3px;padding:3px 5px;font-size:10px;background:#f8f7f5;color:#1a1a1a;outline:none"></select></div>
      <div class="ag"><button class="ab" onclick="alnRef('L')">|←</button><button class="ab" onclick="alnRef('CX')">⇔</button><button class="ab" onclick="alnRef('R')">→|</button><button class="ab" onclick="alnRef('AL')">◁</button></div>
      <div class="ag"><button class="ab" onclick="alnRef('T')">↑</button><button class="ab" onclick="alnRef('CY')">⇕</button><button class="ab" onclick="alnRef('B')">↓</button><button class="ab" onclick="alnRef('AT')">△</button></div>
      <div class="hr"></div>
      <button class="ac" onclick="lyrUp()">앞으로</button>
      <button class="ac" onclick="lyrDn()">뒤로</button>
      <button class="ac red" onclick="delEl()">삭제</button>
    </div>
    <div class="hr"></div>
    <div class="ph" style="margin-top:0">스프레드 작업</div>
    <button class="ac" onclick="clrSpread()">이 스프레드 초기화</button>
    <button class="ac" onclick="cpyAll()">전체에 복사</button>
  </div>
</div>

<!-- 모바일 하단 탭바 (flex child - position:fixed 없음) -->
<div id="m-tabbar">
  <button class="m-tab on" id="mt-select" onclick="mTab('select')"><span class="ico"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M6 4l12 7-12 7V4z" fill="currentColor"/></svg></span><span>선택</span></button>
  <button class="m-tab" id="mt-text" onclick="mTab('text')"><span class="ico"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><text x="3" y="18" font-size="18" font-weight="700" font-family="serif" fill="currentColor">T</text></svg></span><span>텍스트</span></button>
  <button class="m-tab" id="mt-image" onclick="document.getElementById('fi-m').click()"><span class="ico"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="3" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/><circle cx="7.5" cy="8.5" r="1.8" fill="currentColor"/><path d="M2 15l5-5 4 4 3-3 6 6H2z" fill="currentColor"/></svg></span><span>이미지</span></button>
  <button class="m-tab" id="mt-pages" onclick="mSheet('pages')"><span class="ico"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="4" y="2" width="9" height="11" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="9" y="9" width="9" height="11" rx="1" stroke="currentColor" stroke-width="1.8" fill="white"/><rect x="9" y="9" width="9" height="11" rx="1" stroke="currentColor" stroke-width="1.8"/></svg></span><span>페이지</span></button>
  <button class="m-tab" id="mt-props" onclick="mSheet('props')"><span class="ico"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="3" stroke="currentColor" stroke-width="1.8"/><path d="M11 2v3M11 17v3M2 11h3M17 11h3M4.2 4.2l2.1 2.1M15.7 15.7l2.1 2.1M4.2 17.8l2.1-2.1M15.7 6.3l2.1-2.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></span><span>속성</span></button>
</div>

<!-- 하단 시트 -->
<div id="m-sheet">
  <div class="sheet-handle"></div>
  <div id="m-sheet-body"></div>
</div>

<!-- 텍스트 입력 오버레이 -->
<div id="text-overlay">
  <div id="text-box">
    <h3>텍스트 편집</h3>
    <textarea id="text-input" placeholder="텍스트를 입력하세요"></textarea>
    <div id="text-btns">
      <button id="text-cancel" onclick="closeTxtOverlay()">취소</button>
      <button id="text-confirm" onclick="confirmTxt()">확인</button>
    </div>
  </div>
  <div id="text-spacer"></div>
</div>

<script>
// ── 상수 ──
const BL=2,PW=140,PH=200;
const SPINE=BL+PW;       // 142
const SW=BL+PW+PW+BL;   // 284
const SH=BL+PH+BL;      // 204
const LT={x:BL,y:BL,w:PW,h:PH};
const RT={x:SPINE,y:BL,w:PW,h:PH};
const LB={x:0,y:0,w:BL+PW+BL,h:SH};
const RB={x:SPINE-BL,y:0,w:BL+PW+BL,h:SH};
const MM=3.7795275591,RS=3,NS=16;
const CW=Math.round(SW*MM*RS);
const CH=Math.round(SH*MM*RS);
function p(v){return v*MM*RS}
function m(v){return v/(MM*RS)}
function dp(v){return(v*MM*RS*DS).toFixed(2)}
function s2c(v){return v/DS}

// ── 상태 ──
let spreads=Array.from({length:NS},()=>({els:[]}));
let cur=0,tool='select',sel=null;
let dragging=false,resizing=false,dox=0,doy=0;
let showBleed=true,showArt=true,snapOn=true,lockRatio=true;
const SNAP=2;
let DS=0.22,DW,DH,isMobile=false;
let vScale=1,vTX=0,vTY=0;
let pinching=false,pinchD0=0,pinchS0=1;
let lastTap=0,pendTX=0,pendTY=0,editEl=null;

// ── 캔버스 ──
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
cv.width=CW;cv.height=CH;
const gsvg=document.getElementById('gsvg');
const ssvg=document.getElementById('ssvg');

// ── 레이아웃 ──
function initLayout(){
  isMobile=window.innerWidth<=1100;
  const show=(id,v)=>{const el=document.getElementById(id);if(el)el.style.display=v;};
  if(isMobile){
    show('d-toolbar','none');
    show('panel-left','none');
    show('panel-right','none');
    show('m-topbar','flex');
    show('m-tabbar','flex');
    document.getElementById('canvas-area').style.padding='6px';
  } else {
    show('d-toolbar','block');
    show('panel-left','block');
    show('panel-right','block');
    show('m-topbar','none');
    show('m-tabbar','none');
    document.getElementById('canvas-area').style.padding='12px';
  }
  calcDS();
}

function calcDS(){
  const area=document.getElementById('canvas-area');
  const r=area.getBoundingClientRect();
  const availW=Math.max(r.width-16,80);
  const availH=Math.max(r.height-30,80);
  DS=Math.min(Math.max(Math.min(availW/CW,availH/CH),0.04),0.55);
  DW=Math.round(CW*DS);DH=Math.round(CH*DS);
  cv.style.width=DW+'px';cv.style.height=DH+'px';
  [gsvg,ssvg].forEach(s=>{
    s.setAttribute('width',DW);s.setAttribute('height',DH);
    s.style.width=DW+'px';s.style.height=DH+'px';
  });
}

window.addEventListener('resize',()=>{initLayout();render();});

// ── 페이지 라벨 ──
function pgl(si){return si===0?[32,1]:[si*2,si*2+1]}

// ── 렌더 ──
function render(){
  ctx.clearRect(0,0,CW,CH);
  ctx.fillStyle='#c8c4be';ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#dedad4';ctx.fillRect(0,0,p(LB.w),CH);
  ctx.fillStyle='#dedad4';ctx.fillRect(p(RB.x),0,p(RB.w),CH);
  ctx.fillStyle='#fff';ctx.fillRect(p(LT.x),p(LT.y),p(LT.w),p(LT.h));
  ctx.fillStyle='#fff';ctx.fillRect(p(RT.x),p(RT.y),p(RT.w),p(RT.h));
  spreads[cur].els.forEach(el=>drawEl(ctx,el,el===sel));
  drawGuides();syncThumb(cur);
}

function getBounds(el){
  if(el.type==='img')return{x:el.x,y:el.y,w:el.w,h:el.h};
  const fs=p(el.fs);ctx.save();
  ctx.font=`${el.fst||'normal'} ${el.fw||'400'} ${fs}px ${el.ff}`;ctx.textBaseline='top';
  const lines=el.txt.split('\n');
  const tw=m(lines.reduce((a,b)=>Math.max(a,ctx.measureText(b).width),0));
  ctx.restore();
  return{x:el.x,y:el.y,w:Math.max(tw,5),h:el.fs*1.35*lines.length};
}

function drawEl(c,el,isSel){
  c.save();
  if(el.type==='img'){
    c.drawImage(el.img,p(el.x),p(el.y),p(el.w),p(el.h));
    if(isSel){
      c.strokeStyle='#4af';c.lineWidth=2.5;c.setLineDash([7,3]);
      c.strokeRect(p(el.x),p(el.y),p(el.w),p(el.h));c.setLineDash([]);
      c.fillStyle='#4af';c.fillRect(p(el.x+el.w)-12,p(el.y+el.h)-12,18,18);
    }
  } else {
    const fs=p(el.fs);
    c.font=`${el.fst||'normal'} ${el.fw||'400'} ${fs}px ${el.ff}`;
    c.fillStyle=el.col;c.textBaseline='top';
    el.txt.split('\n').forEach((ln,i)=>c.fillText(ln,p(el.x),p(el.y)+i*fs*1.35));
    if(isSel){
      const b=getBounds(el);
      c.strokeStyle='#4af';c.lineWidth=2;c.setLineDash([6,3]);
      c.strokeRect(p(b.x)-3,p(b.y)-3,p(b.w)+6,p(b.h)+6);c.setLineDash([]);
    }
  }
  c.restore();
}

// ── 가이드 ──
function drawGuides(){
  let s='';
  if(showBleed){
    s+=`<line x1="0" y1="0" x2="${dp(SW)}" y2="0" stroke="rgba(255,60,60,.9)" stroke-width="0.8"/>`;
    s+=`<line x1="0" y1="${dp(SH)}" x2="${dp(SW)}" y2="${dp(SH)}" stroke="rgba(255,60,60,.9)" stroke-width="0.8"/>`;
    s+=`<line x1="0" y1="0" x2="0" y2="${dp(SH)}" stroke="rgba(255,60,60,.9)" stroke-width="0.8"/>`;
    s+=`<line x1="${dp(SW)}" y1="0" x2="${dp(SW)}" y2="${dp(SH)}" stroke="rgba(255,60,60,.9)" stroke-width="0.8"/>`;
    s+=`<line x1="${dp(LB.w)}" y1="0" x2="${dp(LB.w)}" y2="${dp(SH)}" stroke="rgba(255,60,60,.4)" stroke-width="0.6" stroke-dasharray="3,2"/>`;
    s+=`<line x1="${dp(RB.x)}" y1="0" x2="${dp(RB.x)}" y2="${dp(SH)}" stroke="rgba(255,60,60,.4)" stroke-width="0.6" stroke-dasharray="3,2"/>`;
    s+=`<text x="2" y="9" font-size="7" fill="rgba(255,80,80,.9)" font-family="sans-serif">블리드</text>`;
  }
  if(showArt){
    s+=`<line x1="${dp(LT.x)}" y1="${dp(LT.y)}" x2="${dp(RT.x+RT.w)}" y2="${dp(LT.y)}" stroke="rgba(80,160,255,.9)" stroke-width="0.9"/>`;
    s+=`<line x1="${dp(LT.x)}" y1="${dp(LT.y+LT.h)}" x2="${dp(RT.x+RT.w)}" y2="${dp(LT.y+LT.h)}" stroke="rgba(80,160,255,.9)" stroke-width="0.9"/>`;
    s+=`<line x1="${dp(LT.x)}" y1="${dp(LT.y)}" x2="${dp(LT.x)}" y2="${dp(LT.y+LT.h)}" stroke="rgba(80,160,255,.9)" stroke-width="0.9"/>`;
    s+=`<line x1="${dp(RT.x+RT.w)}" y1="${dp(RT.y)}" x2="${dp(RT.x+RT.w)}" y2="${dp(RT.y+RT.h)}" stroke="rgba(80,160,255,.9)" stroke-width="0.9"/>`;
    s+=`<line x1="${dp(SPINE)}" y1="0" x2="${dp(SPINE)}" y2="${dp(SH)}" stroke="rgba(255,210,50,.9)" stroke-width="1" stroke-dasharray="5,3"/>`;
    const[lp,rp]=pgl(cur);
    s+=`<text x="${dp(LT.x+1)}" y="${dp(LT.y+4)}" font-size="7" fill="rgba(80,160,255,.85)" font-family="sans-serif">p${lp}</text>`;
    s+=`<text x="${dp(RT.x+1)}" y="${dp(RT.y+4)}" font-size="7" fill="rgba(80,160,255,.85)" font-family="sans-serif">p${rp}</text>`;
  }
  if(showBleed&&showArt){
    [[LT.x,LT.y],[RT.x+RT.w,LT.y],[LT.x,LT.y+LT.h],[RT.x+RT.w,LT.y+LT.h],[SPINE,LT.y],[SPINE,LT.y+LT.h]].forEach(([mx,my])=>{
      const px=parseFloat(dp(mx)),py=parseFloat(dp(my)),sz=5;
      s+=`<line x1="${px-sz}" y1="${py}" x2="${px+sz}" y2="${py}" stroke="rgba(255,60,60,.7)" stroke-width="0.6"/>`;
      s+=`<line x1="${px}" y1="${py-sz}" x2="${px}" y2="${py+sz}" stroke="rgba(255,60,60,.7)" stroke-width="0.6"/>`;
    });
  }
  gsvg.innerHTML=s;
}

function tog(t){
  if(t==='bleed')showBleed=!showBleed;
  else if(t==='art')showArt=!showArt;
  else snapOn=!snapOn;
  const v=t==='bleed'?showBleed:t==='art'?showArt:snapOn;
  ['btn-','m-btn-'].forEach(pre=>document.getElementById(pre+t)?.classList.toggle('on',v));
  if(t!=='snap')render();else ssvg.innerHTML='';
}

// ── 스냅 ──
function doSnap(x,y,w,h){
  if(!snapOn)return{x,y,sx:null,sy:null};
  const xs=[0,BL,SPINE,RT.x+RT.w,SW];
  const ys=[0,BL,BL+PH,SH,SH/2,BL+PH/2];
  spreads[cur].els.forEach(el=>{if(el===sel)return;const b=getBounds(el);xs.push(b.x,b.x+b.w/2,b.x+b.w);ys.push(b.y,b.y+b.h/2,b.y+b.h);});
  let nx=x,ny=y,sx=null,sy=null,mdx=SNAP,mdy=SNAP;
  [[x,'L'],[x+w/2,'C'],[x+w,'R']].forEach(([ex,r])=>{xs.forEach(l=>{const d=Math.abs(ex-l);if(d<mdx){mdx=d;sx=l;nx=r==='L'?l:r==='C'?l-w/2:l-w;}});});
  [[y,'T'],[y+h/2,'C'],[y+h,'B']].forEach(([ey,r])=>{ys.forEach(l=>{const d=Math.abs(ey-l);if(d<mdy){mdy=d;sy=l;ny=r==='T'?l:r==='C'?l-h/2:l-h;}});});
  return{x:nx,y:ny,sx,sy};
}
function showSnap(sx,sy){
  let s='';
  if(sx!=null)s+=`<line x1="${dp(sx)}" y1="0" x2="${dp(sx)}" y2="${dp(SH)}" stroke="rgba(200,120,0,.9)" stroke-width="1" stroke-dasharray="3,2"/>`;
  if(sy!=null)s+=`<line x1="0" y1="${dp(sy)}" x2="${dp(SW)}" y2="${dp(sy)}" stroke="rgba(200,120,0,.9)" stroke-width="1" stroke-dasharray="3,2"/>`;
  ssvg.innerHTML=s;
}

// ── 이미지 업로드 ──
function setupImg(id){
  document.getElementById(id).addEventListener('change',function(){
    const file=this.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const r=img.naturalHeight/img.naturalWidth;
        let w=PW*.85,h=w*r;
        if(h>PH*.85){h=PH*.85;w=h/r;}
        const el={type:'img',x:SPINE-w/2,y:(SH-h)/2,w,h,img,_ratio:w/h};
        spreads[cur].els.push(el);sel=el;setTool('select');updatePanel();render();
      };
      img.onerror=()=>alert('이미지 로드 실패');
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
    setTimeout(()=>{this.value='';},500);
  });
}
setupImg('fi');setupImg('fi-m');

// ── 포인터 처리 ──
function getXY(clientX,clientY){
  const r=cv.getBoundingClientRect();
  if(isMobile)return[s2c((clientX-r.left)/vScale),s2c((clientY-r.top)/vScale)];
  return[s2c(clientX-r.left),s2c(clientY-r.top)];
}
function hitTest(mx,my){
  const els=spreads[cur].els;
  for(let i=els.length-1;i>=0;i--){
    const el=els[i];
    if(el.type==='img'){if(mx>=p(el.x)&&mx<=p(el.x+el.w)&&my>=p(el.y)&&my<=p(el.y+el.h))return el;}
    else{const b=getBounds(el);if(mx>=p(b.x)-4&&mx<=p(b.x+b.w)+4&&my>=p(b.y)-4&&my<=p(b.y+b.h)+4)return el;}
  }
  return null;
}
function isRH(el,mx,my){return el.type==='img'&&Math.abs(mx-p(el.x+el.w))<18&&Math.abs(my-p(el.y+el.h))<18;}
function ptrDown(cx,cy){
  const[mx,my]=getXY(cx,cy);
  if(tool==='select'){
    const el=hitTest(mx,my);
    if(el){sel=el;if(isRH(el,mx,my))resizing=true;else{dragging=true;dox=mx-p(el.x);doy=my-p(el.y);}}
    else sel=null;
    updatePanel();render();
  } else if(tool==='text'){
    pendTX=m(mx);pendTY=m(my);editEl=null;openTxtOverlay('');
  }
}
function ptrMove(cx,cy){
  const[mx,my]=getXY(cx,cy);
  if(dragging&&sel){
    const b=getBounds(sel);const sn=doSnap(m(mx-dox),m(my-doy),b.w,b.h);
    sel.x=sn.x;sel.y=sn.y;showSnap(sn.sx,sn.sy);updatePanel();render();
  } else if(resizing&&sel?.type==='img'){
    const nw=Math.max(5,m(mx)-sel.x),nh=Math.max(5,m(my)-sel.y);
    if(lockRatio&&sel._ratio){const dw=Math.abs(nw-sel.w),dh=Math.abs(nh-sel.h);if(dw>=dh){sel.w=nw;sel.h=nw/sel._ratio;}else{sel.h=nh;sel.w=nh*sel._ratio;}}
    else{sel.w=nw;sel.h=nh;}
    updatePanel();render();
  }
}
function ptrUp(){dragging=false;resizing=false;ssvg.innerHTML='';}

// ── 마우스 ──
cv.addEventListener('mousedown',e=>ptrDown(e.clientX,e.clientY));
cv.addEventListener('mousemove',e=>{
  ptrMove(e.clientX,e.clientY);
  if(tool==='select'){const[mx,my]=getXY(e.clientX,e.clientY);const el=hitTest(mx,my);cv.style.cursor=el?(isRH(el,mx,my)?'nwse-resize':'move'):'default';}
});
cv.addEventListener('mouseup',ptrUp);
cv.addEventListener('mouseleave',ptrUp);
cv.addEventListener('dblclick',e=>{if(tool==='select'&&sel?.type==='txt'){editEl=sel;openTxtOverlay(sel.txt);}});

// ── 터치 ──
let tpx=0,tpy=0;
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    pinching=true;dragging=false;resizing=false;
    pinchD0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    pinchS0=vScale;return;
  }
  const t=e.touches[0];tpx=t.clientX;tpy=t.clientY;
  const now=Date.now();
  if(now-lastTap<300&&sel?.type==='txt'){lastTap=0;editEl=sel;openTxtOverlay(sel.txt);return;}
  lastTap=now;
  ptrDown(t.clientX,t.clientY);
},{passive:false});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2&&pinching){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    vScale=Math.min(Math.max(pinchS0*(d/pinchD0),.4),6);
    document.getElementById('wrap').style.transform=`translate(${vTX}px,${vTY}px) scale(${vScale})`;
    document.getElementById('wrap').style.transformOrigin='0 0';return;
  }
  if(e.touches.length===1){
    const t=e.touches[0];
    if(dragging||resizing)ptrMove(t.clientX,t.clientY);
    else if(!sel){vTX+=t.clientX-tpx;vTY+=t.clientY-tpy;tpx=t.clientX;tpy=t.clientY;document.getElementById('wrap').style.transform=`translate(${vTX}px,${vTY}px) scale(${vScale})`;document.getElementById('wrap').style.transformOrigin='0 0';}
  }
},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();if(pinching){pinching=false;return;}ptrUp();},{passive:false});

// ── 텍스트 오버레이 ──
function openTxtOverlay(txt){
  const input=document.getElementById('text-input');
  const spacer=document.getElementById('text-spacer');
  input.value=txt;
  document.getElementById('text-overlay').classList.add('show');
  function adjKB(){const kbH=window.innerHeight-(window.visualViewport?window.visualViewport.height:window.innerHeight);spacer.style.height=Math.max(kbH,0)+'px';}
  adjKB();
  if(window.visualViewport){window.visualViewport._adj=adjKB;window.visualViewport.addEventListener('resize',adjKB);}
  setTimeout(()=>input.focus(),80);
}
function closeTxtOverlay(){
  document.getElementById('text-overlay').classList.remove('show');
  document.getElementById('text-spacer').style.height='0';
  if(window.visualViewport&&window.visualViewport._adj){window.visualViewport.removeEventListener('resize',window.visualViewport._adj);window.visualViewport._adj=null;}
}
function confirmTxt(){
  const txt=document.getElementById('text-input').value;
  if(!txt.trim()){closeTxtOverlay();return;}
  if(editEl){editEl.txt=txt;}
  else{
    const el={type:'txt',x:pendTX,y:pendTY,txt,
      ff:document.getElementById('sfont').value,
      fs:parseFloat(document.getElementById('ssize').value)||14,
      col:document.getElementById('scolor').value,
      fw:document.getElementById('sweight').value||'400',
      fst:document.getElementById('sstyle').value||'normal'};
    spreads[cur].els.push(el);sel=el;
  }
  setTool('select');closeTxtOverlay();updatePanel();render();
}

// ── 도구 ──
function setTool(t){
  tool=t;
  ['select','text'].forEach(n=>document.getElementById('btn-'+n)?.classList.remove('on'));
  document.getElementById('btn-'+t)?.classList.add('on');
  cv.style.cursor=t==='text'?'text':'default';
}
function mTab(t){
  setTool(t);
  document.querySelectorAll('.m-tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('mt-'+t)?.classList.add('on');
  closeSheet();
}
function applyTxtStyle(){
  if(!sel||sel.type!=='txt')return;
  sel.ff=document.getElementById('sfont').value;
  sel.fs=parseFloat(document.getElementById('ssize').value)||14;
  sel.col=document.getElementById('scolor').value;
  sel.fw=document.getElementById('sweight').value||'400';
  sel.fst=document.getElementById('sstyle').value||'normal';
  render();
}

// ── 모바일 시트 ──
function mSheet(type){
  const body=document.getElementById('m-sheet-body');
  document.querySelectorAll('.m-tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('mt-'+type)?.classList.add('on');
  if(type==='pages'){
    let h='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">';
    for(let s=0;s<NS;s++){const[lp,rp]=pgl(s);h+=`<div onclick="goTo(${s});closeSheet()" style="background:#f8f7f5;border:1.5px solid ${s===cur?'#1a56db':'#222'};border-radius:6px;padding:8px;text-align:center;cursor:pointer"><div style="font-size:10px;color:#999;margin-bottom:4px">p${lp}·${rp}</div><div style="width:100%;height:36px;background:#fff;border-radius:3px"></div></div>`;}
    body.innerHTML=h+'</div>';
  } else if(type==='props'){
    if(!sel){body.innerHTML='<div style="color:#aaa;padding:8px;font-size:12px">요소를 먼저 선택하세요</div>';document.getElementById('m-sheet').classList.add('open');return;}
    const isImg=sel.type==='img';
    const inp=(id,val,label,extra='')=>`<div><div style="font-size:10px;color:#999;margin-bottom:3px">${label}</div><input type="number" value="${val}" step="0.1" ${extra} style="width:100%;background:#f8f7f5;border:1px solid #e0ddd8;border-radius:6px;padding:8px;color:#1a1a1a;font-size:14px;outline:none"></div>`;
    let h=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">${inp('sx',sel.x.toFixed(1),'X (mm)',`oninput="sel.x=parseFloat(this.value)||0;render()"`)}<br>${inp('sy',sel.y.toFixed(1),'Y (mm)',`oninput="sel.y=parseFloat(this.value)||0;render()"`)}</div>`;
    h=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div><div style="font-size:10px;color:#999;margin-bottom:3px">X (mm)</div><input type="number" value="${sel.x.toFixed(1)}" step="0.1" oninput="sel.x=parseFloat(this.value)||0;render()" style="width:100%;background:#f8f7f5;border:1px solid #e0ddd8;border-radius:6px;padding:8px;color:#1a1a1a;font-size:14px;outline:none"></div>
      <div><div style="font-size:10px;color:#999;margin-bottom:3px">Y (mm)</div><input type="number" value="${sel.y.toFixed(1)}" step="0.1" oninput="sel.y=parseFloat(this.value)||0;render()" style="width:100%;background:#f8f7f5;border:1px solid #e0ddd8;border-radius:6px;padding:8px;color:#1a1a1a;font-size:14px;outline:none"></div>
    </div>`;
    if(isImg){
      h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div><div style="font-size:10px;color:#999;margin-bottom:3px">W (mm)</div><input type="number" value="${sel.w.toFixed(1)}" step="0.1" oninput="sel.w=parseFloat(this.value)||10;if(lockRatio&&sel._ratio)sel.h=sel.w/sel._ratio;render()" style="width:100%;background:#f8f7f5;border:1px solid #e0ddd8;border-radius:6px;padding:8px;color:#1a1a1a;font-size:14px;outline:none"></div>
        <div><div style="font-size:10px;color:#999;margin-bottom:3px">H (mm)</div><input type="number" value="${sel.h.toFixed(1)}" step="0.1" oninput="sel.h=parseFloat(this.value)||10;if(lockRatio&&sel._ratio)sel.w=sel.h*sel._ratio;render()" style="width:100%;background:#f8f7f5;border:1px solid #e0ddd8;border-radius:6px;padding:8px;color:#1a1a1a;font-size:14px;outline:none"></div>
      </div>
      <button onclick="toggleRatio();mSheet('props')" style="width:100%;background:${lockRatio?'#1a56db':'#333'};color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;cursor:pointer;margin-bottom:12px">${lockRatio?'● 비율 유지':'○ 비율 해제'}</button>`;
    } else {
      h+=`<div style="margin-bottom:10px">
        <div style="font-size:10px;color:#999;margin-bottom:3px">텍스트</div>
        <textarea oninput="sel.txt=this.value;render()" style="width:100%;background:#f8f7f5;border:1px solid #e0ddd8;border-radius:6px;padding:8px;color:#1a1a1a;font-size:14px;outline:none;min-height:56px;font-family:inherit;resize:none">${sel.txt}</textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div><div style="font-size:10px;color:#999;margin-bottom:3px">크기</div><input type="number" value="${sel.fs}" step="0.5" oninput="sel.fs=parseFloat(this.value)||14;render()" style="width:100%;background:#f8f7f5;border:1px solid #e0ddd8;border-radius:6px;padding:8px;color:#1a1a1a;font-size:14px;outline:none"></div>
        <div><div style="font-size:10px;color:#999;margin-bottom:3px">색상</div><input type="color" value="${sel.col}" oninput="sel.col=this.value;render()" style="width:100%;height:40px;background:#f8f7f5;border:1px solid #e0ddd8;border-radius:6px;padding:2px;cursor:pointer"></div>
      </div>`;
    }
    const bs='background:#f8f7f5;border:1px solid #e0ddd8;border-radius:6px;padding:9px;font-size:12px;cursor:pointer;text-align:center';
    h+=`<div style="font-size:10px;color:#999;margin-bottom:6px">빠른 정렬</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:4px">
      <button style="${bs};color:#999" onclick="aln('L','L')">L⇤</button>
      <button style="${bs};color:#999" onclick="aln('CX','L')">L↔</button>
      <button style="${bs};color:#999" onclick="aln('CX','R')">R↔</button>
      <button style="${bs};color:#999" onclick="aln('R','R')">R⇥</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:12px">
      <button style="${bs};color:#999" onclick="aln('T','S')">↑</button>
      <button style="${bs};color:#999" onclick="aln('CY','S')">⇕</button>
      <button style="${bs};color:#999" onclick="aln('CX','S')">⇔</button>
      <button style="${bs};color:#999" onclick="aln('B','S')">↓</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
      <button onclick="lyrUp()" style="${bs};color:#999">앞으로</button>
      <button onclick="lyrDn()" style="${bs};color:#999">뒤로</button>
      <button onclick="delEl();closeSheet()" style="${bs};color:#d05555;border-color:#5a2020">삭제</button>
    </div>`;
    body.innerHTML=h;
  }
  document.getElementById('m-sheet').classList.add('open');
}
function closeSheet(){document.getElementById('m-sheet').classList.remove('open');}
document.addEventListener('touchstart',e=>{
  if(!e.target.closest('#m-sheet')&&!e.target.closest('#m-tabbar'))closeSheet();
},{passive:true});

// ── 패널 ──
function updatePanel(){
  const ns=document.getElementById('no-sel'),sw=document.getElementById('sel-wrap');
  if(!sel){ns.style.display='block';sw.style.display='none';return;}
  ns.style.display='none';sw.style.display='block';
  document.getElementById('px').value=sel.x.toFixed(1);
  document.getElementById('py').value=sel.y.toFixed(1);
  const isImg=sel.type==='img';
  document.getElementById('sizerow').style.display=isImg?'grid':'none';
  document.getElementById('ratio-row').style.display=isImg?'flex':'none';
  document.getElementById('txtrow').style.display=isImg?'none':'block';
  document.getElementById('fsrow').style.display=isImg?'none':'block';
  if(isImg){
    document.getElementById('pw').value=sel.w.toFixed(1);
    document.getElementById('ph2').value=sel.h.toFixed(1);
    if(!sel._ratio)sel._ratio=sel.w/sel.h;
    document.getElementById('btn-ratio').textContent=lockRatio?'● 비율 유지':'○ 비율 해제';
    document.getElementById('btn-ratio').style.background=lockRatio?'#1a56db':'#555';
    document.getElementById('ratio-val').textContent=sel._ratio?sel._ratio.toFixed(2)+':1':'';
  } else {
    document.getElementById('ptxt').value=sel.txt;
    document.getElementById('pfs').value=sel.fs;
    document.getElementById('sfont').value=sel.ff;
    document.getElementById('ssize').value=sel.fs;
    document.getElementById('scolor').value=sel.col;
    document.getElementById('sweight').value=sel.fw||'400';
    document.getElementById('sstyle').value=sel.fst||'normal';
  }
  const rs=document.getElementById('refsel');
  rs.innerHTML='<option value="">— 선택 —</option>';
  spreads[cur].els.forEach((el,i)=>{if(el===sel)return;rs.innerHTML+=`<option value="${i}">${el.type==='txt'?`"${el.txt.slice(0,10)}"`:` 이미지${i+1}`}</option>`;});
}
function fromPanel(){if(!sel)return;sel.x=parseFloat(document.getElementById('px').value)||0;sel.y=parseFloat(document.getElementById('py').value)||0;if(sel.type==='img'){sel.w=parseFloat(document.getElementById('pw').value)||10;sel.h=parseFloat(document.getElementById('ph2').value)||10;}else{sel.txt=document.getElementById('ptxt').value;sel.fs=parseFloat(document.getElementById('pfs').value)||14;}render();}
function fromPanelW(){if(!sel||sel.type!=='img')return;const w=parseFloat(document.getElementById('pw').value)||10;sel.w=w;if(lockRatio&&sel._ratio){sel.h=w/sel._ratio;document.getElementById('ph2').value=sel.h.toFixed(1);}render();}
function fromPanelH(){if(!sel||sel.type!=='img')return;const h=parseFloat(document.getElementById('ph2').value)||10;sel.h=h;if(lockRatio&&sel._ratio){sel.w=h*sel._ratio;document.getElementById('pw').value=sel.w.toFixed(1);}render();}
function toggleRatio(){lockRatio=!lockRatio;if(lockRatio&&sel?.type==='img')sel._ratio=sel.w/sel.h;updatePanel();}

// ── 정렬 ──
function aln(type,zone){
  if(!sel)return;const b=getBounds(sel);
  let rx,ry,rw,rh;
  if(zone==='L'){rx=LT.x;ry=LT.y;rw=LT.w;rh=LT.h;}
  else if(zone==='R'){rx=RT.x;ry=RT.y;rw=RT.w;rh=RT.h;}
  else{rx=LT.x;ry=LT.y;rw=RT.x+RT.w-LT.x;rh=LT.h;}
  if(type==='L')sel.x=rx;else if(type==='CX')sel.x=rx+rw/2-b.w/2;else if(type==='R')sel.x=rx+rw-b.w;
  else if(type==='T')sel.y=ry;else if(type==='CY')sel.y=ry+rh/2-b.h/2;else if(type==='B')sel.y=ry+rh-b.h;
  else if(type==='F'){sel.x=rx;sel.y=ry;if(sel.type==='img'){sel.w=rw;sel.h=rh;}}
  else if(type==='BF'){sel.x=zone==='R'?SPINE-BL:0;sel.y=0;if(sel.type==='img'){sel.w=zone==='S'?SW:LB.w;sel.h=SH;}}
  updatePanel();render();
}
function alnRef(type){
  if(!sel)return;const idx=parseInt(document.getElementById('refsel').value);if(isNaN(idx))return;
  const ref=spreads[cur].els[idx];if(!ref)return;
  const sb=getBounds(sel),rb=getBounds(ref);
  if(type==='L')sel.x=rb.x;else if(type==='CX')sel.x=rb.x+rb.w/2-sb.w/2;else if(type==='R')sel.x=rb.x+rb.w-sb.w;
  else if(type==='T')sel.y=rb.y;else if(type==='CY')sel.y=rb.y+rb.h/2-sb.h/2;else if(type==='B')sel.y=rb.y+rb.h-sb.h;
  else if(type==='AL')sel.x=rb.x-sb.w;else if(type==='AT')sel.y=rb.y-sb.h;
  updatePanel();render();
}
function delEl(){if(!sel)return;const e=spreads[cur].els,i=e.indexOf(sel);if(i>-1)e.splice(i,1);sel=null;updatePanel();render();}
function lyrUp(){if(!sel)return;const e=spreads[cur].els,i=e.indexOf(sel);if(i<e.length-1){[e[i],e[i+1]]=[e[i+1],e[i]];render();}}
function lyrDn(){if(!sel)return;const e=spreads[cur].els,i=e.indexOf(sel);if(i>0){[e[i],e[i-1]]=[e[i-1],e[i]];render();}}
function clrSpread(){const[a,b]=pgl(cur);if(!confirm(`스프레드 ${a}·${b} 초기화?`))return;spreads[cur].els=[];sel=null;updatePanel();render();}
function cpyAll(){if(!confirm('전체 복사?'))return;const src=spreads[cur].els;spreads.forEach((s,i)=>{if(i!==cur)s.els=src.map(el=>({...el}));});render();}

// ── 썸네일 ──
const TW=40,TH=28;
function buildThumbs(){
  const cont=document.getElementById('thumbs');cont.innerHTML='';
  for(let s=0;s<NS;s++){
    const[lp,rp]=pgl(s);
    const wrap=document.createElement('div');wrap.className='sthumb'+(s===0?' on':'');
    wrap.onclick=(ss=>()=>goTo(ss))(s);
    const row=document.createElement('div');row.className='sthumb-row';
    ['l','r'].forEach((side,si)=>{
      const d=document.createElement('div');d.className='sthumb-'+side;d.style.cssText=`width:${TW}px;height:${TH}px`;
      const c=document.createElement('canvas');c.width=TW*2;c.height=TH*2;c.style.cssText=`width:${TW}px;height:${TH}px;display:block`;
      d.appendChild(c);row.appendChild(d);
      if(si===0){const sp=document.createElement('div');sp.className='sthumb-spine';row.appendChild(sp);}
    });
    const nums=document.createElement('div');nums.className='sthumb-nums';nums.innerHTML=`<span>${lp}</span><span>${rp}</span>`;
    wrap.appendChild(row);wrap.appendChild(nums);cont.appendChild(wrap);
  }
}
function syncThumb(s){
  const thumbs=document.querySelectorAll('.sthumb');const th=thumbs[s];if(!th)return;
  const cvs=th.querySelectorAll('canvas');
  const lW=Math.round(CW*(LB.w/SW)),rX=Math.round(CW*(RB.x/SW)),rW=Math.round(CW*(RB.w/SW));
  [cvs[0],cvs[1]].forEach((tc,i)=>{if(!tc)return;const c=tc.getContext('2d');c.fillStyle='white';c.fillRect(0,0,TW*2,TH*2);c.drawImage(cv,i===0?0:rX,0,i===0?lW:rW,CH,0,0,TW*2,TH*2);});
}
function goTo(s){
  cur=s;sel=null;const[lp,rp]=pgl(s);
  document.getElementById('spread-label').textContent=`스프레드 ${lp} · ${rp}`;
  document.getElementById('d-status').textContent=`p${lp}·${rp}`;
  document.getElementById('m-status').textContent=`p${lp}·${rp}`;
  document.querySelectorAll('.sthumb').forEach((t,i)=>t.classList.toggle('on',i===s));
  updatePanel();render();document.querySelectorAll('.sthumb')[s]?.scrollIntoView({block:'nearest'});
}

// ── PDF ──
function exportPDF(){
  const btns=[document.getElementById('d-exportBtn'),document.getElementById('m-export-btn')];
  btns.forEach(b=>{if(b){b.disabled=true;}});
  const PT=2.834645,PMW=BL+PW+BL;
  const mW=parseFloat((PMW*PT).toFixed(3)),mH=parseFloat((SH*PT).toFixed(3));
  const t1=parseFloat((BL*PT).toFixed(3)),t2=parseFloat(((BL+PW)*PT).toFixed(3)),t3=parseFloat(((BL+PH)*PT).toFixed(3));
  const PCW=Math.round(PMW*MM*RS);
  const spOff=document.createElement('canvas');spOff.width=CW;spOff.height=CH;const soc=spOff.getContext('2d');
  const pgOff=document.createElement('canvas');pgOff.width=PCW;pgOff.height=CH;const poc=pgOff.getContext('2d');
  function rClean(si){soc.clearRect(0,0,CW,CH);soc.fillStyle='white';soc.fillRect(0,0,CW,CH);spreads[si].els.forEach(el=>drawEl(soc,el,false));}
  function getJpeg(si,side){
    rClean(si);poc.clearRect(0,0,PCW,CH);poc.fillStyle='white';poc.fillRect(0,0,PCW,CH);
    const sx=side==='left'?0:Math.round(CW*(RB.x/SW)),sw2=Math.round(CW*(PMW/SW));
    poc.drawImage(spOff,sx,0,sw2,CH,0,0,PCW,CH);
    const b64=pgOff.toDataURL('image/jpeg',.92).split(',')[1];const bin=atob(b64);
    const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return bytes;
  }
  const NP=NS*2;const jpegs=[];
  jpegs.push(getJpeg(0,'right'));
  for(let si=1;si<NS;si++){jpegs.push(getJpeg(si,'left'));jpegs.push(getJpeg(si,'right'));}
  jpegs.push(getJpeg(0,'left'));
  const IB=1,CB=NP+1,PB=NP*2+1,PGS=NP*3+1,CAT=NP*3+2,TOT=NP*3+2;
  const chunks=[];let pos=0;const xr=new Array(TOT+1).fill(0);
  function enc(str){const b=new TextEncoder().encode(str);chunks.push(b);pos+=b.length;}
  function encB(b){chunks.push(b);pos+=b.length;}
  enc('%PDF-1.4\n%\xFF\xFF\xFF\xFF\n');
  for(let i=0;i<NP;i++){const j=jpegs[i];xr[IB+i]=pos;enc(`${IB+i} 0 obj\n<</Type/XObject/Subtype/Image/Width ${PCW}/Height ${CH}/ColorSpace/DeviceRGB/BitsPerComponent 8/Filter/DCTDecode/Length ${j.length}>>\nstream\n`);encB(j);enc('\nendstream\nendobj\n');}
  for(let i=0;i<NP;i++){const st=`q ${mW} 0 0 ${mH} 0 0 cm /Im${IB+i} Do Q`;xr[CB+i]=pos;enc(`${CB+i} 0 obj\n<</Length ${st.length}>>\nstream\n${st}\nendstream\nendobj\n`);}
  for(let i=0;i<NP;i++){xr[PB+i]=pos;enc(`${PB+i} 0 obj\n<</Type/Page/Parent ${PGS} 0 R/MediaBox[0 0 ${mW} ${mH}]/BleedBox[0 0 ${mW} ${mH}]/TrimBox[${t1} ${t1} ${t2} ${t3}]/Contents ${CB+i} 0 R/Resources<</XObject<</Im${IB+i} ${IB+i} 0 R>>>>>>\nendobj\n`);}
  xr[PGS]=pos;enc(`${PGS} 0 obj\n<</Type/Pages/Kids[${Array.from({length:NP},(_,i)=>`${PB+i} 0 R`).join(' ')}]/Count ${NP}>>\nendobj\n`);
  xr[CAT]=pos;enc(`${CAT} 0 obj\n<</Type/Catalog/Pages ${PGS} 0 R>>\nendobj\n`);
  const xrP=pos;enc(`xref\n0 ${TOT+1}\n`);enc('0000000000 65535 f \n');
  for(let i=1;i<=TOT;i++)enc(xr[i].toString().padStart(10,'0')+' 00000 n \n');
  enc(`trailer\n<</Size ${TOT+1}/Root ${CAT} 0 R>>\nstartxref\n${xrP}\n%%EOF\n`);
  const out=new Uint8Array(pos);let off=0;chunks.forEach(c=>{out.set(c,off);off+=c.length;});
  const url=URL.createObjectURL(new Blob([out],{type:'application/pdf'}));
  const a=document.createElement('a');a.href=url;a.download='book_bleed2mm.pdf';document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  btns.forEach(b=>{if(b)b.disabled=false;});
  render();document.querySelectorAll('.sthumb').forEach((t,i)=>t.classList.toggle('on',i===cur));
}

buildThumbs();
initLayout();
