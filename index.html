<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  height: 100%;
  display: flex;
  flex-direction: column;
  background: #333;
  font-family: sans-serif;
}
#topbar {
  flex-shrink: 0;
  height: 44px;
  background: #1a1a1a;
  display: flex;
  align-items: center;
  padding: 0 10px;
  color: white;
  font-size: 13px;
}
#content {
  flex: 1;
  overflow: auto;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 8px;
  min-height: 0;
}
#tabbar {
  flex-shrink: 0;
  height: 56px;
  background: #1a1a1a;
  display: flex;
  border-top: 1px solid #333;
}
.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #666;
  font-size: 10px;
  gap: 2px;
  border: none;
  background: none;
  cursor: pointer;
}
.tab .ico { font-size: 20px; }
.tab.on { color: #1a56db; }
</style>
</head>
<body>
<div id="topbar">상단바</div>
<div id="content">
  <div style="width:300px;height:400px;background:white;border:2px solid red;display:flex;align-items:center;justify-content:center;color:black">캔버스</div>
</div>
<div id="tabbar">
  <button class="tab on"><span class="ico">▶</span><span>선택</span></button>
  <button class="tab"><span class="ico">T</span><span>텍스트</span></button>
  <button class="tab"><span class="ico">🖼</span><span>이미지</span></button>
  <button class="tab"><span class="ico">📄</span><span>페이지</span></button>
  <button class="tab"><span class="ico">⚙️</span><span>속성</span></button>
</div>
</body>
</html>
